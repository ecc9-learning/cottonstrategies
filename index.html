<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotton Strategies</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:#0f1520;color:#fff;min-height:100vh;display:flex;flex-direction:column}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.25rem 2.5rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.6) 0%,transparent 100%)}
.nav-logo{font-size:14px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:#fff;opacity:.9}
.nav-links{display:flex;gap:.75rem;align-items:center}
.nav-tab{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75);text-decoration:none;padding:7px 18px;border:1px solid rgba(255,255,255,.25);border-radius:2px;transition:all .2s;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.nav-tab:hover{color:#fff;border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.08)}
.nav-tab.primary{border-color:rgba(255,255,255,.5);color:#fff}
.nav-tab.secondary{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.6)}
.nav-tab.secondary:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.hero{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 60% 40%,#2c3e6b 0%,#1a2340 40%,#0f1520 100%)}
.hero-orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);width:min(65vw,580px);height:min(65vw,580px);border-radius:50%;background:radial-gradient(circle at 35% 35%,#4a5a8a 0%,#2a3560 30%,#1a2240 60%,#0f1828 100%);box-shadow:inset -20px -20px 60px rgba(0,0,0,.5),inset 15px 15px 40px rgba(255,255,255,.08),0 0 100px rgba(15,25,50,.8);opacity:.9}
.hero-orb::after{content:'';position:absolute;top:12%;left:18%;width:28%;height:20%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,.1) 0%,transparent 70%);transform:rotate(-30deg)}
.hero-content{position:relative;z-index:10;text-align:center;padding:2rem}
.hero-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:400;letter-spacing:.05em;color:#fff;margin-bottom:.5rem;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.hero-subtitle{font-size:clamp(.85rem,1.5vw,1.1rem);letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
footer{padding:1.5rem 2.5rem;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.08);background:#0f1520}
.footer-copy{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.08em;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.footer-email{font-size:12px;color:rgba(255,255,255,.45);text-decoration:none;letter-spacing:.05em;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:color .2s}
.footer-email:hover{color:rgba(255,255,255,.8)}
@media(max-width:600px){nav{padding:1rem 1.25rem}.nav-links{gap:.5rem}footer{flex-direction:column;gap:.5rem;text-align:center}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">Cotton Strategies</div>
  <div class="nav-links">
    <a href="/register.html" class="nav-tab primary">Fall 2026 — Student Login</a>
    <a href="/instructor.html" class="nav-tab secondary">Instructor Login</a>
  </div>
</nav>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-orb"></div>
  <div class="hero-content">
    <h1 class="hero-title">Cotton Strategies</h1>
    <div class="hero-subtitle">Professor Eliot Cotton &nbsp;·&nbsp; Texas Law</div>
  </div>
</div>
<footer>
  <div class="footer-copy">© 2026 Cotton Strategies</div>
  <a href="mailto:eliot.cotton@law.utexas.edu" class="footer-email">eliot.cotton@law.utexas.edu</a>
</footer>
</body>
</html>
