<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Negotiation Class — Cotton Strategies</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;min-height:100vh;color:#111}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 1.25rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{font-size:14px;font-weight:700;color:#111;letter-spacing:-.3px}
.header-right{display:flex;align-items:center;gap:.75rem}
.header-name{font-size:13px;color:#6b7280}
.logout{font-size:12px;color:#9ca3af;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px}
.logout:hover{color:#111;background:#f3f4f6}
.main{max-width:620px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* STATES */
.state{text-align:center;padding:3rem 1.5rem;background:#fff;border-radius:14px;border:1px solid #e5e7eb;margin-bottom:1rem}
.state-icon{font-size:36px;margin-bottom:.75rem}
.state-title{font-size:17px;font-weight:700;color:#111;margin-bottom:.4rem}
.state-sub{font-size:14px;color:#6b7280;line-height:1.6;max-width:340px;margin:0 auto}
.spinner{width:22px;height:22px;border:2.5px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ASSIGNMENT CARD */
.assignment-card{background:#fff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:1rem}
.assignment-header{padding:1rem 1.25rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.assignment-label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em}
.assignment-sim{font-size:16px;font-weight:700;color:#111;margin-top:2px}
.assignment-body{padding:1.25rem;display:grid;grid-template-columns:auto 1fr;gap:1rem}
.group-box{background:#f3f4f6;border-radius:10px;padding:.875rem 1.25rem;text-align:center;min-width:80px}
.group-label{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.group-number{font-size:32px;font-weight:800;color:#111;line-height:1}
.role-box{display:flex;flex-direction:column;justify-content:center}
.role-label{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.role-name{font-size:20px;font-weight:700}
.role-seller{color:#1d4ed8}.role-buyer{color:#16a34a}.role-other{color:#7c3aed}
.counterpart{font-size:13px;color:#6b7280;margin-top:6px}
.download-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:0 0 14px 14px;background:#2563eb;color:#fff;cursor:pointer;transition:background .15s;margin-top:0}
.download-btn:hover{background:#1d4ed8}
.download-btn:disabled{opacity:.5;cursor:not-allowed}

/* ANNOUNCEMENT */
.announcement{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:11px 14px;font-size:14px;color:#92400e;margin-bottom:1rem;display:flex;align-items:flex-start;gap:.5rem}

/* RESULTS SECTION */
.section-card{background:#fff;border-radius:14px;border:1px solid #e5e7eb;margin-bottom:1rem;overflow:hidden}
.section-card-header{padding:1rem 1.25rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.section-card-title{font-size:14px;font-weight:600;color:#111}
.section-card-body{padding:1.25rem}

/* FORM */
.progress-bar-wrap{height:3px;background:#f3f4f6;border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.progress-bar-fill{height:100%;background:#2563eb;border-radius:2px;transition:width .3s}
.field{margin-bottom:1.1rem}
.field-label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:.4rem}
.field-req{color:#dc2626}
.radio-group{display:flex;flex-wrap:wrap;gap:.4rem}
.radio-opt{padding:7px 13px;border:1.5px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:13px;color:#374151;transition:all .12s;user-select:none}
.radio-opt:hover{border-color:#93c5fd;background:#eff6ff}
.radio-opt.sel{border-color:#2563eb;background:#eff6ff;color:#1d4ed8;font-weight:500}
input[type=text],input[type=number],textarea{width:100%;padding:9px 12px;font-size:14px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#111;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
textarea{min-height:75px;resize:vertical}
.submit-btn{width:100%;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:10px;background:#2563eb;color:#fff;cursor:pointer;margin-top:.5rem;transition:background .15s}
.submit-btn:hover{background:#1d4ed8}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.edit-btn{width:100%;padding:10px;font-size:13px;font-weight:500;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#374151;cursor:pointer;margin-top:.5rem}
.edit-btn:hover{background:#f9fafb}

/* SUCCESS */
.success-banner{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:11px 14px;font-size:14px;color:#166534;display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.confirmed-banner{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:11px 14px;font-size:14px;color:#1d4ed8;display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.disputed-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:11px 14px;font-size:14px;color:#dc2626;margin-bottom:1rem}

/* READONLY */
.readonly-row{padding:.6rem 0;border-bottom:1px solid #f9fafb;display:flex;gap:.75rem}
.readonly-row:last-child{border-bottom:none}
.readonly-label{font-size:11px;color:#9ca3af;font-weight:500;min-width:120px;flex-shrink:0;padding-top:1px}
.readonly-value{font-size:13px;color:#374151;line-height:1.5}

/* REVIEW */
.review-card{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.review-card-title{font-size:14px;font-weight:700;color:#92400e;margin-bottom:.4rem}
.review-card-sub{font-size:13px;color:#92400e;margin-bottom:1rem;line-height:1.5}
.review-answers{background:#fff;border-radius:8px;padding:.875rem;margin-bottom:1rem;border:1px solid #fde68a}
.review-item{padding:.4rem 0;border-bottom:1px solid #fef9c3;font-size:13px}
.review-item:last-child{border-bottom:none}
.review-item-label{font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.review-item-value{color:#374151;font-weight:500}
.review-actions{display:flex;gap:.5rem}
.btn-confirm{flex:1;padding:10px;font-size:13px;font-weight:600;border:none;border-radius:8px;background:#166534;color:#fff;cursor:pointer}
.btn-confirm:hover{background:#14532d}
.btn-dispute{flex:1;padding:10px;font-size:13px;font-weight:600;border:1.5px solid #dc2626;border-radius:8px;background:#fff;color:#dc2626;cursor:pointer}
.btn-dispute:hover{background:#fef2f2}
.dispute-form{margin-top:.875rem;display:none}
.dispute-form.show{display:block}

/* HISTORY */
.history-row{padding:.6rem 0;border-bottom:1px solid #f9fafb;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.history-row:last-child{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-gray{background:#f3f4f6;color:#6b7280}
.draft-notice{font-size:12px;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;margin-bottom:1rem;display:flex;align-items:center;gap:.4rem}

/* SUBMIT SUCCESS */
.submit-success{text-align:center;padding:2.5rem 1.5rem;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">Cotton Strategies</div>
  <div class="header-right">
    <span class="header-name" id="header-name"></span>
    <button class="logout" onclick="doLogout()">Log out</button>
  </div>
</div>

<div class="main" id="main">
  <div class="state"><div class="spinner"></div></div>
</div>

<script>
const SUPA_URL='https://wqrdutahoszmptebeupl.supabase.co';
const SUPA_KEY='sb_publishable_M0wQUS_qpy3MmAjMMdTDVw_6ld8QIum';

async function sb(path,opts={}){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})},
    ...opts
  });
  const txt=await res.text();
  let data;try{data=JSON.parse(txt);}catch(e){data=txt;}
  return{ok:res.ok,status:res.status,data};
}

function getSession(){
  const t=localStorage.getItem('neg_token'),e=localStorage.getItem('neg_expires'),id=localStorage.getItem('neg_student_id');
  if(!t||!e||!id||new Date(e)<new Date()){
    ['neg_token','neg_expires','neg_student_id'].forEach(k=>localStorage.removeItem(k));
    return null;
  }
  return{token:t,studentId:id};
}

function doLogout(){
  ['neg_token','neg_expires','neg_student_id'].forEach(k=>localStorage.removeItem(k));
  window.location.href='index.html';
}

let student=null,activeSim=null,assignment=null,submission=null,partnerSub=null;
let formValues={},editMode=false,draftKey='';

async function init(){
  const sess=getSession();
  if(!sess){window.location.href='register.html';return;}
  try{
    const r=await sb('students?id=eq.'+sess.studentId+'&select=id,name,email');
    if(!r.ok||!r.data.length){doLogout();return;}
    student=r.data[0];
    document.getElementById('header-name').textContent=student.name;
    await load();
  }catch(e){showError('Something went wrong. Please refresh.');}
}

async function load(){
  const[simR,aR,subR]=await Promise.all([
    sb('simulations?is_active=eq.true&select=*'),
    sb('assignments?student_id=eq.'+student.id+'&select=*'),
    sb('submissions?student_id=eq.'+student.id+'&select=*')
  ]);
  activeSim=simR.ok&&simR.data.length?{
    ...simR.data[0],
    fields: typeof simR.data[0].fields==='string'?JSON.parse(simR.data[0].fields):(simR.data[0].fields||[]),
    roles: typeof simR.data[0].roles==='string'?JSON.parse(simR.data[0].roles):(simR.data[0].roles||[])
  }:null;
  if(!activeSim){renderNoSim();setTimeout(load,60000);return;}

  draftKey='neg_draft_'+student.id+'_'+activeSim.id;
  assignment=aR.ok?aR.data.find(a=>a.simulation_id===activeSim.id):null;
  submission=subR.ok?subR.data.find(s=>s.simulation_id===activeSim.id):null;

  // Load partner submission
  partnerSub=null;
  if(assignment?.released){
    const pR=await sb('assignments?simulation_id=eq.'+activeSim.id+'&group_number=eq.'+assignment.group_number+'&student_id=neq.'+student.id+'&select=student_id');
    if(pR.ok&&pR.data.length){
      const psR=await sb('submissions?student_id=eq.'+pR.data[0].student_id+'&simulation_id=eq.'+activeSim.id+'&select=*');
      if(psR.ok&&psR.data.length)partnerSub=psR.data[0];
    }
  }

  const histR=await sb('assignments?student_id=eq.'+student.id+'&released=eq.true&select=simulation_id,role,group_number,released_at&order=released_at.desc');
  render(histR.ok?histR.data:[]);
}

function showError(msg){
  document.getElementById('main').innerHTML=`<div class="state"><div class="state-icon">⚠️</div><div class="state-title">Something went wrong</div><div class="state-sub">${msg}</div></div>`;
}

function renderNoSim(){
  document.getElementById('main').innerHTML=`<div class="state">
    <div class="state-icon">📋</div>
    <div class="state-title">You're all set!</div>
    <div class="state-sub">Check back before class — your assignment will appear here when your instructor releases it.</div>
  </div>`;
}

function roleColor(role){
  const r=role.toLowerCase();
  if(r.includes('seller')||r.includes('director')||r.includes('morgan')||r.includes('atlas')||r.includes('meridian')||r.includes('stockman')||r.includes('downtown'))return'role-seller';
  if(r.includes('buyer')||r.includes('tutor')||r.includes('martinez')||r.includes('blue horizon')||r.includes('crestwood')||r.includes('turbo')||r.includes('united')||r.includes('absentia'))return'role-buyer';
  return'role-other';
}

async function render(history){
  const main=document.getElementById('main');
  let html='';

  // Announcement
  if(activeSim?.announcement){
    html+=`<div class="announcement">📌 <span>${activeSim.announcement}</span></div>`;
  }

  // Assignment card
  if(!assignment?.released){
    html+=`<div class="state">
      <div class="state-icon">⏳</div>
      <div class="state-title">Assignment coming soon</div>
      <div class="state-sub">${activeSim.name} is this week. Your group and role will appear here when your instructor releases assignments.</div>
    </div>`;
    setTimeout(load,60000);
  } else {
    // Mark brief viewed
    if(!assignment.brief_viewed_at){
      await sb('assignments?id=eq.'+assignment.id,{method:'PATCH',body:JSON.stringify({brief_viewed_at:new Date().toISOString()}),prefer:'return=minimal'});
    }

    html+=`<div class="assignment-card">
      <div class="assignment-header">
        <div>
          <div class="assignment-label">Your assignment</div>
          <div class="assignment-sim">${activeSim.name}</div>
        </div>
      </div>
      <div class="assignment-body">
        <div class="group-box">
          <div class="group-label">Group</div>
          <div class="group-number">${assignment.group_number}</div>
        </div>
        <div class="role-box">
          <div class="role-label">Your role</div>
          <div class="role-name ${roleColor(assignment.role)}">${assignment.role}</div>
          <div class="counterpart" id="counterpart-area">Loading group members…</div>
        </div>
      </div>
      <button class="download-btn" id="dl-btn" onclick="downloadBrief()">
        ↓ &nbsp;Download role brief (PDF)
      </button>
    </div>`;
    setTimeout(loadCounterparts,100);
  }

  // Results section
  if(assignment?.released){
    if(!activeSim.submission_open&&!submission){
      html+=`<div class="section-card">
        <div class="section-card-header"><div class="section-card-title">Results</div></div>
        <div class="section-card-body">
          <div class="state" style="border:none;padding:1.5rem .5rem">
            <div class="state-icon">📝</div>
            <div class="state-title">Results form not yet open</div>
            <div class="state-sub">Your instructor will open the form after the simulation ends.</div>
          </div>
        </div>
      </div>`;
    } else if(submission&&!editMode){
      const fd=submission.form_data||{};
      const confirmed=fd._confirmed,disputed=fd._disputed;

      // Partner review prompt
      if(partnerSub&&!confirmed&&!disputed){
        html+=renderReviewPrompt();
      }

      html+=`<div class="section-card">
        <div class="section-card-header">
          <div class="section-card-title">Your submitted results</div>
          <span style="font-size:12px;color:#9ca3af">${fmtTime(submission.submitted_at)}</span>
        </div>
        <div class="section-card-body">
          ${confirmed?`<div class="confirmed-banner">✓ Results confirmed with your partner</div>`:''}
          ${disputed?`<div class="disputed-banner">⚠️ Disagreement flagged — your instructor will review both versions</div>`:''}
          <div class="success-banner">✓ Submitted successfully</div>
          ${renderReadonly(activeSim.fields,fd)}
          ${canEdit()?`<button class="edit-btn" onclick="enterEdit()">Edit my results (${minsLeft()} min remaining)</button>`:''}
        </div>
      </div>`;

    } else if(activeSim.submission_open){
      const draft=localStorage.getItem(draftKey);
      if(draft&&!editMode){try{formValues=JSON.parse(draft);}catch(e){formValues={};}}
      else if(editMode&&submission){formValues={...submission.form_data};}

      html+=`<div class="section-card">
        <div class="section-card-header"><div class="section-card-title">${editMode?'Edit your results':'Submit your results'}</div></div>
        <div class="section-card-body">
          ${draft&&!editMode?`<div class="draft-notice">💾 We saved your progress from earlier.</div>`:''}
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
          <div id="form-fields">${renderForm(activeSim.fields,formValues)}</div>
          <button class="submit-btn" id="sub-btn" onclick="doSubmit()">${editMode?'Update results':'Submit results'}</button>
          ${editMode?`<button class="edit-btn" onclick="cancelEdit()">Cancel</button>`:''}
        </div>
      </div>`;
      startAutosave();
    }
  }

  // History
  if(history.length>1){
    html+=`<div class="section-card">
      <div class="section-card-header"><div class="section-card-title">Past simulations</div></div>
      <div class="section-card-body" style="padding:.5rem 1.25rem">
        ${history.slice(1).map(h=>`<div class="history-row">
          <div><strong style="font-size:13px">${h.simulation_id}</strong> <span style="color:#9ca3af;font-size:12px">${h.role}</span></div>
          <span class="badge badge-gray">Group ${h.group_number}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  main.innerHTML=html;
  restoreRadios();
  updateProgress();
}

function renderReviewPrompt(){
  if(!partnerSub||!activeSim)return'';
  const fields=(activeSim.fields||[]).filter(f=>f.id!=='f1'&&f.id!=='f3');
  const answers=fields.map(f=>{
    const v=partnerSub.form_data?.[f.id];
    if(!v)return'';
    return`<div class="review-item"><div class="review-item-label">${f.label}</div><div class="review-item-value">${v}</div></div>`;
  }).filter(Boolean).join('');

  return`<div class="review-card">
    <div class="review-card-title">📋 Your partner submitted results</div>
    <div class="review-card-sub">Review their answers. If they match your understanding, confirm. If not, flag a disagreement.</div>
    <div class="review-answers">${answers}</div>
    ${!submission
      ?`<div style="font-size:13px;color:#92400e;margin-bottom:.75rem">Submit your own results first, then confirm or dispute.</div>`
      :`<div class="review-actions">
        <button class="btn-confirm" onclick="doConfirm()">✓ Confirm — this matches</button>
        <button class="btn-dispute" onclick="showDisputeForm()">⚠ Disagree</button>
      </div>
      <div class="dispute-form" id="dispute-form">
        <div class="field" style="margin-top:.75rem">
          <label class="field-label">What's different? (optional note for your instructor)</label>
          <textarea id="dispute-note" placeholder="e.g. We agreed on $3,200, not $3,100"></textarea>
        </div>
        <button class="submit-btn" style="background:#dc2626" onclick="doDispute()">Flag disagreement</button>
      </div>`}
  </div>`;
}

function renderReadonly(fields,data){
  return(fields||[]).filter(f=>!['_confirmed','_disputed','_dispute_note'].includes(f.id)).map(f=>`
    <div class="readonly-row">
      <div class="readonly-label">${f.label||''}</div>
      <div class="readonly-value">${data[f.id]||'—'}</div>
    </div>`).join('');
}

function renderForm(fields,values){
  return(fields||[]).map(f=>`
    <div class="field">
      <label class="field-label">${f.label||''}${f.required?'<span class="field-req"> *</span>':''}</label>
      ${f.type==='radio'&&f.options
        ?`<div class="radio-group">${(f.options||[]).map(o=>`<div class="radio-opt${values[f.id]===o?' sel':''}" onclick="selR('${f.id}','${o.replace(/'/g,"\\'")}',this)" data-f="${f.id}">${o}</div>`).join('')}</div>`
        :f.type==='textarea'
          ?`<textarea id="ff-${f.id}" oninput="setV('${f.id}',this.value)">${values[f.id]||''}</textarea>`
          :`<input type="${f.type==='number'?'number':'text'}" id="ff-${f.id}" value="${values[f.id]||''}" oninput="setV('${f.id}',this.value)">`}
    </div>`).join('');
}

function restoreRadios(){
  if(!activeSim)return;
  (activeSim.fields||[]).forEach(f=>{
    if(f.type==='radio'&&formValues[f.id]){
      document.querySelectorAll('[data-f="'+f.id+'"]').forEach(el=>{
        el.classList.toggle('sel',el.textContent===formValues[f.id]);
      });
    }
  });
}

function selR(fid,val,el){
  document.querySelectorAll('[data-f="'+fid+'"]').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  formValues[fid]=val;
  updateProgress();
  saveDraft();
}

function setV(fid,val){formValues[fid]=val;updateProgress();saveDraft();}

function updateProgress(){
  if(!activeSim)return;
  const filled=(activeSim.fields||[]).filter(f=>formValues[f.id]&&String(formValues[f.id]).trim()).length;
  const total=(activeSim.fields||[]).length;
  const fill=document.getElementById('prog-fill');
  if(fill)fill.style.width=Math.round((filled/total)*100)+'%';
}

function saveDraft(){if(draftKey)localStorage.setItem(draftKey,JSON.stringify(formValues));}
let autosaveTimer=null;
function startAutosave(){if(autosaveTimer)clearInterval(autosaveTimer);autosaveTimer=setInterval(saveDraft,30000);}

function canEdit(){
  if(!submission||!activeSim?.submission_open)return false;
  return(Date.now()-new Date(submission.submitted_at).getTime())<30*60*1000;
}

function minsLeft(){
  if(!submission)return 0;
  return Math.max(0,Math.round(30-(Date.now()-new Date(submission.submitted_at).getTime())/60000));
}

function enterEdit(){editMode=true;load();}
function cancelEdit(){editMode=false;load();}

async function doSubmit(){
  if(!activeSim)return;
  const missing=(activeSim.fields||[]).filter(f=>f.required&&!formValues[f.id]);
  if(missing.length){alert('Please fill in: '+missing.map(f=>f.label).join(', '));return;}
  if(!confirm('Submit your results for '+activeSim.name+'?'))return;
  const btn=document.getElementById('sub-btn');
  btn.disabled=true;btn.textContent='Submitting…';
  try{
    const payload={student_id:student.id,simulation_id:activeSim.id,form_data:formValues,submitted_at:new Date().toISOString(),updated_at:new Date().toISOString()};
    if(submission){
      await sb('submissions?id=eq.'+submission.id,{method:'PATCH',body:JSON.stringify({form_data:formValues,updated_at:new Date().toISOString()}),prefer:'return=minimal'});
    }else{
      await sb('submissions',{method:'POST',body:JSON.stringify(payload),prefer:'return=minimal'});
    }
    if(draftKey)localStorage.removeItem(draftKey);
    editMode=false;
    await load();
  }catch(e){
    saveDraft();
    btn.disabled=false;btn.textContent=editMode?'Update results':'Submit results';
    alert('Submission failed — your answers are saved as a draft. Please try again.');
  }
}

async function downloadBrief(){
  const btn=document.getElementById('dl-btn');
  btn.disabled=true;btn.textContent='Opening…';
  const roleName=assignment.role.replace(/[^a-zA-Z0-9]/g,'-');
  const url=SUPA_URL+'/storage/v1/object/public/role-briefs/'+activeSim.id+'/'+roleName+'.pdf';
  window.open(url,'_blank');
  setTimeout(()=>{btn.disabled=false;btn.innerHTML='↓ &nbsp;Download role brief (PDF)';},1000);
}

async function loadCounterparts(){
  if(!assignment||!activeSim)return;
  const r=await sb('assignments?simulation_id=eq.'+activeSim.id+'&group_number=eq.'+assignment.group_number+'&released=eq.true&select=student_id,role');
  if(!r.ok)return;
  const others=r.data.filter(a=>a.student_id!==student.id);
  if(!others.length){const el=document.getElementById('counterpart-area');if(el)el.textContent='';return;}
  const ids=others.map(o=>'"'+o.student_id+'"').join(',');
  const nr=await sb('students?id=in.('+ids+')&select=id,name');
  if(!nr.ok)return;
  const nm={};nr.data.forEach(s=>nm[s.id]=s.name);
  const parts=others.map(o=>(nm[o.student_id]||'Unknown')+' ('+o.role+')').join(', ');
  const el=document.getElementById('counterpart-area');
  if(el)el.textContent='With: '+parts;
}

async function doConfirm(){
  if(!submission)return;
  await sb('submissions?id=eq.'+submission.id,{method:'PATCH',body:JSON.stringify({form_data:{...submission.form_data,_confirmed:true},updated_at:new Date().toISOString()}),prefer:'return=minimal'});
  await load();
}

function showDisputeForm(){document.getElementById('dispute-form')?.classList.add('show');}

async function doDispute(){
  if(!submission)return;
  const note=document.getElementById('dispute-note')?.value||'';
  await sb('submissions?id=eq.'+submission.id,{method:'PATCH',body:JSON.stringify({form_data:{...submission.form_data,_disputed:true,_dispute_note:note},updated_at:new Date().toISOString()}),prefer:'return=minimal'});
  await load();
}

function fmtTime(iso){return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

init();
</script>
