<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cotton Strategies — My Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1e3c;
  --navy-2:#162447;
  --navy-3:#1e3a6e;
  --slate:#2d3e5f;
  --slate-3:#546a8f;
  --sand:#e8dcc8;
  --cream:#fdfaf5;
  --bg:#f4f6fa;
  --surface:#ffffff;
  --border:#dde3ef;
  --border-2:#c8d0e4;
  --text:#0f1e3c;
  --text-2:#2d3e5f;
  --text-3:#546a8f;
  --text-4:#8fa3c0;
  --accent:#bf5700;
  --accent-hover:#a84a00;
  --accent-light:rgba(191,87,0,.07);
  --accent-border:rgba(191,87,0,.18);
  --blue:#1a56db;
  --blue-light:#ebf0ff;
  --green:#0d7c4b;
  --green-light:#e6f7ef;
  --green-border:#a3d9be;
  --red:#c0392b;
  --red-light:#fdf0ef;
  --red-border:#f5b8b3;
  --yellow:#9a6800;
  --yellow-light:#fdf8e8;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 1px 3px rgba(15,30,60,.05),0 8px 24px rgba(15,30,60,.08);
}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;
  font-size:15px;line-height:1.55;
}

/* ── NAV ── */
nav{
  background:var(--navy);
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,.2);
}
.nav-logo{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:600;
  letter-spacing:.01em;color:#fff;text-decoration:none;
  display:flex;align-items:center;gap:7px;
}
.nav-logo::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block}
.nav-logo em{color:#ffab66;font-style:italic}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-name{font-size:12px;color:rgba(255,255,255,.45);font-weight:400;font-family:'Space Grotesk',sans-serif}
.nav-logout{
  font-size:11.5px;color:rgba(255,255,255,.4);cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:6px;padding:5px 12px;transition:all .15s;
  font-family:'DM Sans',sans-serif;font-weight:500;
}
.nav-logout:hover{background:rgba(255,255,255,.15);color:#fff}

/* ── LAYOUT ── */
main{flex:1;max-width:660px;width:100%;margin:0 auto;padding:28px 20px 60px}

/* ── CARDS ── */
.card{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow);
  margin-bottom:16px;overflow:hidden;
  transition:box-shadow .2s;
}
.card-header{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.01em;
}
.card-sub{font-size:13px;color:var(--text-3);margin-top:3px;line-height:1.5}
.card-body{padding:20px 24px 24px}
.card-divider{height:1px;background:var(--border)}

/* ── PILLS ── */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  font-size:10.5px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;font-family:'Space Grotesk',sans-serif;
}
.pill-green{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.pill-blue{background:var(--blue-light);color:var(--blue);border:1px solid rgba(26,86,219,.2)}
.pill-orange{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border)}
.pill-yellow{background:var(--yellow-light);color:var(--yellow);border:1px solid rgba(154,104,0,.2)}
.pill-gray{background:var(--bg);color:var(--text-3);border:1px solid var(--border)}

/* ── ASSIGNMENT BLOCK ── */
.assignment-block{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-3) 100%);
  border-radius:var(--radius-sm);
  padding:22px 24px;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.assignment-block::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;border-radius:50%;
  background:rgba(191,87,0,.12);
}
.assignment-role{
  font-family:'Playfair Display',serif;
  font-size:30px;font-weight:700;color:#fff;
  line-height:1.1;margin-bottom:5px;
  position:relative;z-index:1;
}
.assignment-sim{
  font-size:13px;color:rgba(255,255,255,.6);
  font-weight:500;margin-bottom:8px;
  font-family:'Space Grotesk',sans-serif;
  position:relative;z-index:1;
}
.assignment-partner{
  font-size:13px;color:rgba(255,255,255,.45);
  padding-top:10px;border-top:1px solid rgba(255,255,255,.1);
  margin-top:8px;position:relative;z-index:1;
}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 20px;font-size:13px;font-weight:600;
  border:none;border-radius:var(--radius-sm);
  cursor:pointer;transition:all .15s;
  font-family:'DM Sans',sans-serif;letter-spacing:.01em;
}
.btn-primary{background:var(--navy-3);color:#fff}
.btn-primary:hover{background:var(--navy);transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,30,60,.2)}
.btn-outline{background:var(--surface);color:var(--text);border:1.5px solid var(--border-2)}
.btn-outline:hover{background:var(--bg);border-color:var(--slate-3)}
.btn-block{width:100%;justify-content:center}
.btn-sm{padding:7px 14px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ── FORM ── */
.field{margin-bottom:18px}
.field-label{
  display:block;font-size:10.5px;font-weight:700;
  color:var(--text-3);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:8px;
  font-family:'Space Grotesk',sans-serif;
}
.field-req{color:var(--accent)}
.field input,.field textarea,.field select{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:14px;color:var(--text);
  background:var(--surface);outline:none;
  transition:border .15s,box-shadow .15s;
  font-family:'DM Sans',sans-serif;
}
.field input:focus,.field textarea:focus{
  border-color:var(--navy-3);
  box-shadow:0 0 0 3px rgba(30,58,110,.1);
}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.radio-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.radio-option{
  display:flex;align-items:center;gap:7px;
  padding:9px 14px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;transition:all .15s;
  background:var(--surface);user-select:none;
}
.radio-option:hover{border-color:var(--navy-3);background:var(--blue-light)}
.radio-option.selected{
  border-color:var(--navy-3);background:var(--blue-light);
  color:var(--navy-3);font-weight:600;
}
.radio-option input{display:none}

/* ── PROGRESS BAR ── */
.progress-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:22px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--navy-3),var(--accent));border-radius:2px;transition:width .3s}

/* ── NOTES ── */
.notes-wrap{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.notes-label{
  font-size:10.5px;font-weight:700;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
  font-family:'Space Grotesk',sans-serif;
}
.notes-area{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;color:var(--text);background:#fafbfd;
  outline:none;resize:vertical;min-height:100px;
  line-height:1.7;font-family:'DM Sans',sans-serif;transition:border .15s;
}
.notes-area:focus{border-color:var(--navy-3);box-shadow:0 0 0 3px rgba(30,58,110,.08)}
.notes-saved{font-size:11px;color:var(--green);margin-top:5px;opacity:0;transition:opacity .3s}
.notes-saved.show{opacity:1}

/* ── READONLY RESULTS ── */
.readonly-row{
  display:flex;gap:16px;padding:10px 0;
  border-bottom:1px solid var(--bg);align-items:flex-start;
}
.readonly-row:last-child{border-bottom:none}
.readonly-label{
  font-size:10px;font-weight:700;color:var(--text-4);
  text-transform:uppercase;letter-spacing:.07em;
  min-width:130px;flex-shrink:0;padding-top:2px;
  font-family:'Space Grotesk',sans-serif;
}
.readonly-value{font-size:14px;color:var(--text);line-height:1.55;flex:1}

/* ── PARTNER REVIEW ── */
.review-card{
  background:var(--yellow-light);
  border:1.5px solid rgba(154,104,0,.2);
  border-radius:var(--radius-sm);padding:18px 20px;margin-bottom:16px;
}
.review-title{font-size:14px;font-weight:700;color:var(--yellow);margin-bottom:4px}
.review-sub{font-size:13px;color:#7a5200;margin-bottom:14px;line-height:1.6}
.review-answers{
  background:var(--surface);border-radius:8px;padding:14px;
  margin-bottom:14px;border:1px solid rgba(154,104,0,.15);
}
.review-item{padding:7px 0;border-bottom:1px solid #fef3c0;font-size:13px;line-height:1.5}
.review-item:last-child{border-bottom:none}
.review-item-lbl{
  font-size:9.5px;color:var(--text-4);font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;
  font-family:'Space Grotesk',sans-serif;
}
.review-actions{display:flex;gap:8px}
.btn-confirm{
  flex:1;padding:11px;font-size:13px;font-weight:600;
  border:none;border-radius:var(--radius-sm);
  background:var(--green);color:#fff;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .15s;
}
.btn-confirm:hover{background:#096e40;transform:translateY(-1px)}
.btn-dispute{
  flex:1;padding:11px;font-size:13px;font-weight:600;
  border:1.5px solid var(--red);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--red);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .15s;
}
.btn-dispute:hover{background:var(--red-light)}
.dispute-form{margin-top:12px;display:none}
.dispute-form.show{display:block}

/* ── BANNERS ── */
.banner{
  border-radius:var(--radius-sm);padding:11px 16px;
  font-size:13px;margin-bottom:14px;
  display:flex;align-items:flex-start;gap:10px;line-height:1.5;
}
.banner-green{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.banner-red{background:var(--red-light);color:var(--red);border:1px solid var(--red-border)}
.banner-blue{background:var(--blue-light);color:var(--blue);border:1px solid rgba(26,86,219,.2)}
.banner-orange{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border)}

/* ── TIMELINE ── */
.timeline{padding:20px 24px;display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:14px;position:relative}
.tl-item:not(:last-child) .tl-line{
  position:absolute;left:9px;top:22px;width:1px;height:100%;
  background:var(--border);
}
.tl-dot{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  margin-top:3px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;z-index:1;
  font-family:'Space Grotesk',sans-serif;
}
.tl-dot-done{background:var(--green-light);color:var(--green);border:2px solid var(--green)}
.tl-dot-active{
  background:var(--navy-3);color:#fff;border:2px solid var(--navy-3);
  box-shadow:0 0 0 3px rgba(30,58,110,.2);
}
.tl-dot-future{background:var(--surface);color:var(--text-4);border:2px solid var(--border)}
.tl-content{flex:1;padding-bottom:20px}
.tl-name{font-size:13px;font-weight:600;color:var(--text)}
.tl-name.future{color:var(--text-4);font-weight:400}
.tl-meta{font-size:12px;color:var(--text-3);margin-top:2px}
.tl-outcome{font-size:12px;color:var(--green);margin-top:3px;font-weight:600}
.tl-preview{
  font-size:12px;color:var(--text-3);margin-top:5px;
  line-height:1.6;font-style:italic;
}

/* ── HISTORY ── */
.history-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--bg);
  font-size:13px;gap:12px;
}
.history-row:last-child{border-bottom:none}

/* ── REFLECTION ── */
.reflection-card{
  background:var(--blue-light);border:1.5px solid rgba(26,86,219,.2);
  border-radius:var(--radius-sm);padding:18px 20px;margin-bottom:16px;
}
.reflection-title{font-size:14px;font-weight:700;color:var(--navy-3);margin-bottom:4px}
.reflection-sub{font-size:13px;color:var(--slate);margin-bottom:16px;line-height:1.6}

/* ── STATES ── */
.state{text-align:center;padding:40px 20px}
.state-icon{font-size:38px;margin-bottom:14px}
.state-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px;font-family:'Playfair Display',serif}
.state-sub{font-size:14px;color:var(--text-3);line-height:1.7;max-width:300px;margin:0 auto}
.spinner{
  width:24px;height:24px;
  border:2.5px solid var(--border);
  border-top-color:var(--navy-3);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SUBMIT BUTTON ── */
.submit-btn{
  width:100%;padding:14px;font-size:14px;font-weight:700;
  border:none;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--navy-3),var(--navy));
  color:#fff;cursor:pointer;transition:all .15s;
  margin-top:10px;font-family:'DM Sans',sans-serif;letter-spacing:.01em;
  box-shadow:0 2px 8px rgba(15,30,60,.15);
}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,30,60,.25)}
.submit-btn:disabled{background:#c8d0e4;cursor:not-allowed;transform:none;box-shadow:none}

/* ── DRAFT NOTICE ── */
.draft-notice{
  background:var(--yellow-light);border:1px solid rgba(154,104,0,.2);
  border-radius:8px;padding:10px 14px;font-size:13px;
  color:var(--yellow);margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}

/* ── WAITING ── */
.waiting-banner{
  background:var(--blue-light);border:1.5px solid rgba(26,86,219,.2);
  border-radius:var(--radius-sm);padding:18px 20px;
  margin-bottom:16px;text-align:center;
}
.waiting-banner .spinner{border-top-color:var(--blue);margin:0 auto 10px}

/* ── CONFIRMED ── */
.confirmed-card{
  background:linear-gradient(135deg,var(--green-light),#f0fff8);
  border:1.5px solid var(--green-border);
  border-radius:var(--radius-sm);padding:20px;
  margin-bottom:16px;text-align:center;
}

/* ── ASSESSMENT ── */
.assess-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(10,18,36,.65);backdrop-filter:blur(5px);
  align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:20px;
}
.assess-modal{
  background:#fff;border-radius:var(--radius);
  width:100%;max-width:720px;margin:auto;
  overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.3);
}
.assess-modal-header{
  background:linear-gradient(135deg,var(--navy),var(--navy-3));
  padding:20px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.assess-modal-title{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;color:#fff;
}
.assess-modal-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:3px}
.assess-close{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.assess-close:hover{background:rgba(255,255,255,.25)}
.assess-modal-body{padding:24px 28px}
.assess-modal-footer{
  padding:16px 28px 24px;display:flex;gap:10px;
  align-items:center;justify-content:flex-end;
  border-top:1px solid var(--border);
}

/* ── RESPONSIVE ── */
@media(max-width:540px){
  main{padding:14px 12px 48px}
  .card-header{padding:14px 16px 0}
  .card-body{padding:14px 16px 18px}
  .card-title{font-size:15px}
  .assignment-role{font-size:24px}
  .assignment-block{padding:16px 18px}
  .timeline{padding:14px 16px}
  .readonly-label{min-width:90px;font-size:9.5px}
  .readonly-value{font-size:13px}
  nav{padding:0 14px}
  .nav-logo{font-size:14px}
  .review-actions{flex-direction:column}
  .btn{padding:9px 16px;font-size:12.5px}
  .submit-btn{padding:13px;font-size:13.5px}
  .radio-group{gap:6px}
  .radio-option{padding:8px 12px;font-size:12.5px}
  .assess-modal-body{padding:16px}
  .assess-modal-footer{padding:12px 16px 20px;flex-wrap:wrap;gap:8px}
  .assess-modal-footer .btn{flex:1;min-width:120px}
  table{font-size:11px}
  th,td{padding:5px 7px}
}
@media(max-width:380px){
  main{padding:10px 10px 40px}
  .card-header{padding:12px 14px 0}
  .card-body{padding:12px 14px 16px}
  .assignment-role{font-size:22px}
  .stat-val{font-size:20px}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Cotton <em>Strategies</em></a>
  <div class="nav-right">
    <span class="nav-name" id="nav-name"></span>
    <button class="nav-logout" onclick="logout()">Log out</button>
  </div>
</nav>
<main id="main"><div class="state"><div class="spinner"></div></div></main>

<script>
const SUPA_URL='https://wqrdutahoszmptebeupl.supabase.co';
const SUPA_KEY='sb_publishable_M0wQUS_qpy3MmAjMMdTDVw_6ld8QIum';

let student=null,activeSim=null,assignment=null,submission=null,allSims=[];
let formValues={},editMode=false,draftKey='',notesSaveTimer=null;
let allAssessmentAssignments=[],myAssessments=[];
// Separate values object for the dispute form — never mixed with main form
let disputeValues={};

async function sb(path,opts={}){
  const prefer=opts.prefer||'return=representation';
  const r=await fetch(SUPA_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':prefer,...(opts.headers||{})},
    ...opts
  });
  let data=null;
  try{const t=await r.text();data=t?JSON.parse(t):null;}catch(e){}
  return{ok:r.ok,status:r.status,data};
}

function logout(){localStorage.removeItem('neg_student_id');window.location.href='/register.html';}

async function init(){
  const sid=localStorage.getItem('neg_student_id');
  if(!sid){window.location.href='/register.html';return;}
  const r=await sb('students?id=eq.'+sid+'&select=*');
  if(!r.ok||!r.data?.length){localStorage.removeItem('neg_student_id');window.location.href='/register.html';return;}
  student=r.data[0];
  document.getElementById('nav-name').textContent=student.name.split(' ')[0];
  await load();
}

async function load(){
  const [simR,asgR,subR,allSimR,reflR,aaR,saR,notesR]=await Promise.all([
    sb('simulations?is_active=eq.true&select=*&limit=1'),
    sb('assignments?student_id=eq.'+student.id+'&released=eq.true&select=*&order=created_at.desc'),
    sb('submissions?student_id=eq.'+student.id+'&select=*&order=submitted_at.desc'),
    sb('simulations?select=id,name,sort_order,description,is_active,reflection_question&order=sort_order.asc'),
    sb('reflections?student_id=eq.'+student.id+'&select=*'),
    sb('assessment_assignments?is_open=eq.true&select=*'),
    sb('self_assessments?student_id=eq.'+student.id+'&select=*'),
    sb('notes?student_id=eq.'+student.id+'&select=*')
  ]);

  activeSim = simR.ok&&simR.data?.length ? {
    ...simR.data[0],
    fields: typeof simR.data[0].fields==='string'?JSON.parse(simR.data[0].fields):(simR.data[0].fields||[]),
    roles: typeof simR.data[0].roles==='string'?JSON.parse(simR.data[0].roles):(simR.data[0].roles||[]),
    role_docs: typeof simR.data[0].role_docs==='string'?JSON.parse(simR.data[0].role_docs):(simR.data[0].role_docs||{})
  } : null;

  allSims = allSimR.ok ? allSimR.data : [];
  allAssessmentAssignments = aaR.ok ? aaR.data : [];
  myAssessments = saR.ok ? saR.data : [];
  window._myNotes = notesR.ok ? notesR.data : [];

  assignment = asgR.ok&&asgR.data?.length ? (asgR.data.find(a=>activeSim&&a.simulation_id===activeSim.id)||null) : null;
  submission = subR.ok&&subR.data?.length ? (subR.data.find(s=>activeSim&&s.simulation_id===activeSim.id)||null) : null;

  const submissions = subR.ok ? subR.data : [];
  const assignments = asgR.ok ? asgR.data : [];
  const reflections = reflR.ok ? reflR.data : [];

  // Load partner assignments and submissions
  let partnerSubs=[], partnerAssignments=[];
  if(assignment&&activeSim){
    const pAsgR=await sb('assignments?simulation_id=eq.'+activeSim.id+'&group_number=eq.'+assignment.group_number+'&released=eq.true&student_id=neq.'+student.id+'&select=student_id,role');
    if(pAsgR.ok&&pAsgR.data?.length){
      partnerAssignments=pAsgR.data;
      const ids=pAsgR.data.map(a=>'"'+a.student_id+'"').join(',');
      const pSubR=await sb('submissions?student_id=in.('+ids+')&simulation_id=eq.'+activeSim.id+'&select=*');
      if(pSubR.ok&&pSubR.data?.length) partnerSubs=pSubR.data;
    }
  }

  draftKey = activeSim ? 'draft_'+student.id+'_'+activeSim.id : '';
  render(assignments,submissions,reflections,partnerSubs,partnerAssignments);
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(assignments,submissions,reflections,pSubs,pAsgs){
  const main=document.getElementById('main');
  let html='';

  // ── 1. OPEN ASSESSMENT ──
  if(allAssessmentAssignments&&allAssessmentAssignments.length){
    allAssessmentAssignments.forEach(aa=>{
      if(!(myAssessments&&myAssessments.find(a=>a.type===aa.type))){
        html+=`<div class="card" style="border-left:3px solid var(--accent)">
          <div class="card-header">
            <div>
              <div class="card-title">${aa.type==='pre'?'Pre-Semester':'End-of-Semester'} Self-Assessment</div>
              <div class="card-sub">Required before class · Takes about 5 minutes</div>
            </div>
            <span class="pill pill-orange">Action needed</span>
          </div>
          <div class="card-body">
            <p style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:16px">Score yourself on 25 statements about how you approach negotiation. Answer honestly — there are no right or wrong answers.</p>
            <button class="btn btn-primary" onclick="openAssessmentPage('${aa.type}')">Open assessment →</button>
          </div>
        </div>`;
      }
    });
  }

  // ── 2. ACTIVE SIMULATION ──
  if(activeSim){
    html+=`<div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${activeSim.name}</div>
          <div class="card-sub">This week's simulation</div>
        </div>
        <span class="pill pill-orange">● Live now</span>
      </div>
      <div class="card-body">`;

    if(!assignment){
      html+=`<div class="state" style="padding:20px 0">
        <div class="state-icon">⏳</div>
        <div class="state-title">Assignment coming soon</div>
        <div class="state-sub">Your instructor will release pairings before class. Check back shortly.</div>
      </div>`;
      setTimeout(load,30000);
    } else {
      html+=`<div class="assignment-block">
        <div class="assignment-role">${assignment.role}</div>
        <div class="assignment-sim">${activeSim.name} · Group ${assignment.group_number}</div>
        <div class="assignment-partner" id="partner-line">Loading partner…</div>
      </div>`;

      const briefUrl=SUPA_URL+'/storage/v1/object/public/role-briefs/'+activeSim.id+'/'+encodeURIComponent(assignment.role)+'.pdf';
      const briefOpened=!!assignment.brief_opened_at;
      html+=`<div style="display:flex;gap:8px;margin-bottom:2px">
        <button class="btn btn-primary" style="flex:1" onclick="downloadBrief('${briefUrl}','${assignment.id}')">
          ${briefOpened?'📖 View brief again':'↓ Download role brief'}
        </button>
        <a href="${briefUrl}" target="_blank" class="btn btn-outline" style="flex-shrink:0;text-decoration:none" onclick="trackBriefOpen('${assignment.id}')" title="Open PDF in browser">↗</a>
      </div>`;
      if(briefOpened){
        html+=`<div style="font-size:11px;color:var(--text-3);text-align:center;margin-top:5px">
          First opened ${new Date(assignment.brief_opened_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
        </div>`;
      }

      html+=`<div class="notes-wrap">
        <div class="notes-label">📝 My notes <span style="font-weight:400;text-transform:none;font-size:11px">— private, only you can see these</span></div>
        <textarea class="notes-area" id="notes-area" placeholder="Take notes on your brief, strategy, key interests…" oninput="scheduleNotesSave()">${getNotes()}</textarea>
        <div class="notes-saved" id="notes-saved">Saved ✓</div>
      </div>`;
    }
    html+=`</div></div>`;

    // ── Results / form area ──
    if(assignment){
      const fd=submission?.form_data||{};
      const confirmed=fd._confirmed;
      const disputed=fd._disputed;

      if(submission&&!editMode){
        // ── BOTH SUBMITTED — show review card if not yet confirmed/disputed ──
        const pendingReview=(pSubs||[]).filter(ps=>!confirmed&&!disputed);
        if(pendingReview.length){
          html+=renderReviewCard(pendingReview,pAsgs||[]);
        } else if(confirmed){
          html+=`<div class="confirmed-card">
            <div style="font-size:28px;margin-bottom:8px">🤝</div>
            <div style="font-size:15px;font-weight:700;color:var(--green);margin-bottom:4px">Agreement confirmed</div>
            <div style="font-size:13px;color:#166534">You and your partner are in agreement.</div>
          </div>`;
        } else if(disputed){
          html+=`<div class="banner banner-red" style="margin-bottom:16px">
            <span>⚠</span>
            <span>Disagreement flagged — your instructor will review both versions.</span>
          </div>`;
        }

        // Contextual "what happens now" message
        const partnerPending=!(pSubs||[]).length&&!confirmed&&!disputed;
        const formStillOpen=activeSim.submission_open;
        if(partnerPending&&formStillOpen){
          html+=`<div style="background:var(--blue-light);border:1px solid rgba(26,86,219,.18);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--blue)">
            <strong>✓ Submitted.</strong> Waiting for your partner — this page checks automatically every 20 seconds.
            <div style="margin-top:6px;font-size:12px;opacity:.8">💡 While you wait, jot some notes above about how the negotiation went.</div>
          </div>`;
        } else if(!partnerPending&&!confirmed&&!disputed&&(pSubs||[]).length){
          html+=`<div style="background:var(--green-light);border:1px solid var(--green-border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--green)">
            <strong>Both sides have submitted.</strong> Review your partner's answers below, then confirm or flag a disagreement.
          </div>`;
        }

        // Your submitted results
        html+=`<div class="card">
          <div class="card-header">
            <div class="card-title">Your results</div>
            <span class="pill pill-green">✓ Submitted</span>
          </div>
          <div class="card-body">
            ${renderReadonly(activeSim.fields,fd)}
            ${canEdit()?`<button class="btn btn-outline btn-block" style="margin-top:14px" onclick="enterEdit()">✏️ Edit my results</button>`:''}
          </div>
        </div>`;

        // Show reflection only once the negotiation is fully resolved:
        // confirmed, disputed, or both submitted with no pending review left
        const fullyResolved=confirmed||disputed||(!pendingReview.length&&(pSubs||[]).length>0);
        if(fullyResolved){
          const hasRefl=reflections.find(r=>r.simulation_id===activeSim.id);
          if(!hasRefl) html+=renderReflectionForm();
          else html+=`<div class="card"><div class="card-body"><div class="banner banner-green" style="margin-bottom:0">✓ Reflection submitted</div></div></div>`;
        }

      } else if(!submission&&(pSubs||[]).length>0&&!editMode){
        // ── PARTNER SUBMITTED FIRST — show proposed agreement ──
        html+=renderPartnerOfferCard(pSubs,pAsgs);

      } else if(activeSim.submission_open||editMode){
        // ── FORM: normal submit or edit mode ──
        if(!editMode){
          const draft=localStorage.getItem(draftKey);
          if(draft){try{formValues=JSON.parse(draft);}catch(e){formValues={};}}
        } else if(editMode&&submission){
          formValues={...submission.form_data};
          // Strip internal flags from editable form
          delete formValues._confirmed; delete formValues._disputed;
          delete formValues._dispute_note; delete formValues._original_answers;
        }
        html+=`<div class="card">
          <div class="card-header"><div class="card-title">${editMode?'Edit your results':'Submit your results'}</div></div>
          <div class="card-body">
            ${!editMode&&localStorage.getItem(draftKey)?'<div class="draft-notice">💾 Picking up where you left off.</div>':''}
            <div class="progress-wrap"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
            <div id="form-fields">${renderForm(activeSim.fields,formValues,'ff')}</div>
            <button class="submit-btn" id="sub-btn" onclick="doSubmit()">${editMode?'Update results':'Submit results'}</button>
            ${editMode?`<button class="btn btn-outline btn-block" style="margin-top:8px" onclick="cancelEdit()">Cancel</button>`:''}
          </div>
        </div>`;
        setTimeout(startAutosave,100);

      } else if(submission&&!editMode){
        // Submitted, form now closed — waiting for partner
        if(!(pSubs||[]).length){
          html+=`<div class="waiting-banner">
            <div class="spinner"></div>
            <div style="font-size:13px;font-weight:600;color:var(--blue);margin-bottom:4px">Waiting for your partner to submit…</div>
            <div style="font-size:12px;color:#1e40af;margin-bottom:8px">This page checks automatically every 20 seconds.</div>
            <div style="font-size:12px;color:#1e40af;background:rgba(37,99,235,.08);border-radius:6px;padding:8px 12px;margin-top:4px">
              💡 <strong>While you wait:</strong> Jot down your initial reaction in the notes section above — what went well, what surprised you.
            </div>
          </div>`;
        }
      } else if(submission&&!editMode&&(pSubs||[]).length){
        // Both submitted — no action needed
      } else {
        // Form not yet open, no submission
        html+=`<div class="card"><div class="card-body">
          <div style="text-align:center;padding:20px 0">
            <div style="font-size:22px;margin-bottom:10px">⏳</div>
            <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px">Results form not open yet</div>
            <div style="font-size:13px;color:var(--text-3);line-height:1.6;max-width:280px;margin:0 auto">
              Your instructor will open it before or during class. 
              ${assignment?'Use the notes area above to prep your strategy.':'Check back when pairings are released.'}
            </div>
          </div>
        </div></div>`;
      }

      // Auto-poll: student submitted but partner hasn't yet
      if(submission&&!(pSubs||[]).length&&!fd._confirmed&&!fd._disputed){
        setTimeout(load,20000);
      }
    }

  } else {
    html+=`<div class="card"><div class="card-body"><div class="state">
      <div class="state-icon">📚</div>
      <div class="state-title">No active simulation</div>
      <div class="state-sub">Your instructor will activate the next simulation before class.</div>
    </div></div></div>`;
  }

  // ── 3. SEMESTER TIMELINE ──
  if(allSims.length){
    const submittedIds=submissions.map(s=>s.simulation_id);
    html+=`<div class="card">
      <div class="card-header"><div class="card-title">Semester timeline</div></div>
      <div class="timeline">`;
    allSims.forEach((s,i)=>{
      const isDone=submittedIds.includes(s.id)&&!s.is_active;
      const isActive=s.is_active;
      const sub=submissions.find(x=>x.simulation_id===s.id);
      const asg=assignments.find(a=>a.simulation_id===s.id);
      const dotClass=isDone?'tl-dot-done':isActive?'tl-dot-active':'tl-dot-future';
      const dotLabel=isDone?'✓':isActive?'●':(i+1);
      const dealField=(s.fields||[]).find?.(f=>f.type==='radio'&&(f.options||[]).includes('Yes'))?.id||'f4';
      html+=`<div class="tl-item">
        <div class="tl-line"></div>
        <div class="tl-dot ${dotClass}">${dotLabel}</div>
        <div class="tl-content">
          <div class="tl-name ${!isDone&&!isActive?'future':''}">${s.name}</div>
          ${isDone&&asg?`<div class="tl-meta">Role: ${asg.role}</div>`:''}
          ${isDone&&sub?`<div class="tl-outcome">${sub.form_data?.f4==='Yes'||sub.form_data?.[dealField]==='Yes'?'✓ Deal reached':'✗ No deal'}</div>`:''}
          ${isActive?`<div class="tl-meta" style="color:var(--accent);font-weight:600">In progress now</div>${s.description?`<div class="tl-preview">${s.description}</div>`:''}`:''}
          ${!isDone&&!isActive&&s.description?`<div class="tl-preview">${s.description}</div>`:''}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // ── 4. PAST RESULTS ──
  const pastSubs=submissions.filter(s=>!activeSim||s.simulation_id!==activeSim.id);
  if(pastSubs.length){
    html+=`<div class="card">
      <div class="card-header"><div class="card-title">Past results</div></div>
      <div class="card-body">`;
    pastSubs.forEach(sub=>{
      const sim=allSims.find(s=>s.id===sub.simulation_id);
      const asg=assignments.find(a=>a.simulation_id===sub.simulation_id);
      const dealField=(sim?.fields||[]).find?.(f=>f.type==='radio'&&(f.options||[]).includes('Yes'))?.id||'f4';
      html+=`<div class="history-row">
        <div>
          <div style="font-weight:600">${sim?.name||sub.simulation_id}</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:2px">${asg?asg.role:''}</div>
        </div>
        <span class="pill ${sub.form_data?.[dealField]==='Yes'?'pill-green':'pill-gray'}">${sub.form_data?.[dealField]==='Yes'?'✓ Deal':'No deal'}</span>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // ── 5. COMPLETED ASSESSMENTS ──
  if(myAssessments&&myAssessments.length){
    myAssessments.forEach(a=>{
      const totals=typeof a.col_totals==='string'?JSON.parse(a.col_totals):(a.col_totals||{});
      html+=`<div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${a.type==='pre'?'Pre-Semester':'End-of-Semester'} Self-Assessment</div>
            <div class="card-sub">Completed · Anonymous ID: <strong>#${String(student.anon_number||'?').padStart(2,'0')}</strong></div>
          </div>
          <span class="pill pill-green">✓ Complete</span>
        </div>
        <div class="card-body">
          <div style="font-size:12px;color:var(--text-3);margin-bottom:12px">Your column totals:</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            ${['A','B','C','D','E'].map(col=>`<div style="text-align:center;padding:10px 16px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
              <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--accent)">${totals[col]||0}</div>
              <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px">${col}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>`;
    });
  }

  // ── 6. MY NOTES ──
  const allNotes=window._myNotes||[];
  if(allNotes.filter(n=>n.content&&n.content.trim()).length){
    html+=`<div class="card">
      <div class="card-header"><div class="card-title">📝 My notes</div></div>
      <div class="card-body">`;
    allSims.forEach(sim=>{
      const note=allNotes.find(n=>n.simulation_id===sim.id);
      if(!note||!note.content||!note.content.trim())return;
      html+=`<div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">${sim.name}</div>
        <div style="font-size:13px;color:var(--text-2);white-space:pre-wrap;line-height:1.6">${note.content}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // ── 7. MY FULL RESULTS ──
  if(submissions.length){
    const pastWithDetails=allSims.map(sim=>{
      const sub=submissions.find(s=>s.simulation_id===sim.id);
      const asg=assignments.find(a=>a.simulation_id===sim.id);
      const refl=reflections.find(r=>r.simulation_id===sim.id);
      if(!sub)return null;
      return{sim,sub,asg,refl};
    }).filter(Boolean);
    if(pastWithDetails.length){
      html+=`<div class="card">
        <div class="card-header"><div class="card-title">📊 My full results</div></div>
        <div class="card-body">`;
      pastWithDetails.forEach(({sim,sub,asg,refl})=>{
        const fields=(sim.fields||[]).filter(f=>!f.id.startsWith('_'));
        const dealField=fields.find(f=>f.type==='radio'&&(f.options||[]).includes('Yes'))?.id||'f4';
        const deal=sub.form_data?.[dealField];
        html+=`<div style="padding:14px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700">${sim.name}</span>
            <span style="font-size:12px;color:var(--text-3)">${asg?.role||''}</span>
            <span class="pill ${deal==='Yes'?'pill-green':'pill-gray'}">${deal==='Yes'?'✓ Deal':'No deal'}</span>
          </div>
          ${fields.map(f=>{
            const v=sub.form_data?.[f.id];
            if(!v||v==='—')return'';
            return`<div style="display:flex;gap:12px;padding:3px 0;font-size:12px">
              <span style="color:var(--text-3);min-width:130px;flex-shrink:0">${(f.label||f.id).substring(0,40)}</span>
              <span style="color:var(--text-2)">${v}</span>
            </div>`;
          }).filter(Boolean).join('')}
          ${refl?`<div style="background:var(--blue-light);border-radius:6px;padding:8px 10px;margin-top:8px;font-size:12px">
            <div style="font-weight:700;color:var(--blue);margin-bottom:4px">Your reflection</div>
            ${refl.mistake?`<div style="margin-bottom:3px"><span style="color:var(--text-3)">Mistake: </span>${refl.mistake}</div>`:''}
            ${refl.do_differently?`<div style="margin-bottom:3px"><span style="color:var(--text-3)">Would do differently: </span>${refl.do_differently}</div>`:''}
            ${refl.custom_response?`<div><span style="color:var(--text-3)">Response: </span>${refl.custom_response}</div>`:''}
          </div>`:''}
        </div>`;
      });
      html+=`</div></div>`;
    }
  }

  // ── 8. MY PROGRESS ──
  if(submissions.length>1) html+=renderMyProgress(submissions,assignments,reflections);

  main.innerHTML=html;
  if(assignment) loadPartnerName();
  updateProgress();
  restoreRadios('ff');
}

// ── PARTNER OFFER CARD (partner submitted first, student hasn't) ──────────────
function renderPartnerOfferCard(pSubs,pAsgs){
  const ps=pSubs[0];
  const pAsg=(pAsgs||[]).find(a=>a.student_id===ps.student_id);
  const visibleFields=(activeSim.fields||[]).filter(f=>!f.id.startsWith('_')&&!f.private);
  const answers=visibleFields.map(f=>{
    const v=ps.form_data?.[f.id];
    if(!v)return'';
    return`<div class="review-item"><div class="review-item-lbl">${f.label}</div><div>${v}</div></div>`;
  }).filter(Boolean).join('');
  window._pendingPartnerSub=ps;

  return`<div class="card" style="border-left:3px solid var(--green)">
    <div class="card-header">
      <div>
        <div class="card-title">📋 Proposed agreement on the table</div>
        <div class="card-sub">${pAsg?.role||'Your partner'} has submitted their version. Review the terms below.</div>
      </div>
      <span class="pill pill-green">Pending your response</span>
    </div>
    <div class="card-body">
      <div class="review-answers" style="margin-bottom:16px">${answers||'<div style="color:#9ca3af;font-size:13px">No answers recorded.</div>'}</div>
      <div style="font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:10px">Do these terms match your understanding of the negotiation?</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn-confirm" style="flex:1" onclick="acceptPartnerTerms()">✓ Accept — these terms are correct</button>
        <button class="btn-dispute" style="flex:1" onclick="showCounterForm()">✎ Submit different terms</button>
      </div>
      <div id="counter-form-wrap" style="display:none">
        <div style="font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:12px;padding-top:12px;border-top:1px solid var(--border)">
          Edit the terms below to reflect what you believe happened, then submit.
        </div>
        <div class="progress-wrap"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
        <div id="counter-form-fields"></div>
        <button class="submit-btn" id="counter-sub-btn" onclick="doCounterSubmit()">Submit my version</button>
      </div>
      <div style="font-size:11px;color:var(--text-3);text-align:center">Most negotiations end in agreement — only submit different terms if something is genuinely off.</div>
    </div>
  </div>`;
}

// ── REVIEW CARD (both submitted, neither confirmed/disputed yet) ──────────────
function renderReviewCard(pendingReviews,pAsgs){
  if(!pendingReviews||!pendingReviews.length||!activeSim)return'';
  const fields=(activeSim.fields||[]).filter(f=>!['_confirmed','_disputed','_dispute_note','_original_answers'].includes(f.id)&&!f.id.startsWith('_'));

  const partnerCards=pendingReviews.map(ps=>{
    const pAsg=pAsgs.find(a=>a.student_id===ps.student_id);
    const role=pAsg?.role||'Partner';
    const answers=fields.map(f=>{
      const v=ps.form_data?.[f.id];
      if(!v)return'';
      return`<div class="review-item"><div class="review-item-lbl">${f.label}</div><div>${v}</div></div>`;
    }).filter(Boolean).join('');
    return`<div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">${role}'s answers</div>
      <div class="review-answers">${answers||'<div style="color:#9ca3af;font-size:12px">No answers recorded.</div>'}</div>
    </div>`;
  }).join('');

  const disputeFormHtml=renderForm(activeSim.fields,submission?submission.form_data:{},'dff');

  return`<div class="review-card">
    <div class="review-title">📋 ${pendingReviews.length===1?'Your partner has':'Your partners have'} submitted their results</div>
    <div class="review-sub">Compare their answers with yours. If everything matches, confirm. If something is off, submit your corrected version.</div>
    ${partnerCards}
    <div class="review-actions">
      <button class="btn-confirm" onclick="doConfirm()">✓ Confirmed — we agree</button>
      <button class="btn-dispute" onclick="showDisputeForm()">⚠ We disagree</button>
    </div>
    <div class="dispute-form" id="dispute-form">
      <div style="font-size:13px;font-weight:600;color:var(--red);margin:12px 0 10px">Correct any fields that are wrong, then submit your version:</div>
      <div id="dispute-form-fields">${disputeFormHtml}</div>
      <div class="field" style="margin-top:4px">
        <label class="field-label">Note for your instructor <span style="font-weight:400;text-transform:none;font-size:11px">(optional)</span></label>
        <textarea id="dispute-note" placeholder="Briefly describe what you disagree with" style="min-height:50px;width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;resize:vertical;outline:none"></textarea>
      </div>
      <button class="submit-btn" style="background:var(--red)" onclick="doDispute()">Submit my version</button>
    </div>
  </div>`;
}

// ── FORM RENDERER ─────────────────────────────────────────────────────────────
function renderForm(fields,values,prefix){
  prefix=prefix||'ff';
  return (fields||[]).filter(f=>!['_confirmed','_disputed','_dispute_note','_original_answers'].includes(f.id)&&!f.id.startsWith('_')).map(f=>{
    const req=f.required?`<span class="field-req">*</span>`:'';
    const inputId=prefix+'_'+f.id;
    if(f.type==='radio'){
      const opts=(f.options||[]).map(o=>{
        const sel=(values&&values[f.id]===o)?'selected':'';
        return`<label class="radio-option ${sel}" onclick="selectRadio('${prefix}','${f.id}','${o}',this)">
          <input type="radio" name="${prefix}_${f.id}" value="${o}" ${sel?'checked':''}>${o}
        </label>`;
      }).join('');
      return`<div class="field"><label class="field-label">${f.label||f.id} ${req}</label><div class="radio-group">${opts}</div></div>`;
    }
    if(f.type==='number'){
      return`<div class="field"><label class="field-label">${f.label||f.id} ${req}</label>
        <input type="number" id="${inputId}" value="${(values&&values[f.id])||''}"
          oninput="updateFormValue('${prefix}','${f.id}',this.value)" placeholder="Enter number">
      </div>`;
    }
    if(f.type==='textarea'){
      return`<div class="field"><label class="field-label">${f.label||f.id} ${req}</label>
        <textarea id="${inputId}" oninput="updateFormValue('${prefix}','${f.id}',this.value)" placeholder="Your answer…">${(values&&values[f.id])||''}</textarea>
      </div>`;
    }
    return`<div class="field"><label class="field-label">${f.label||f.id} ${req}</label>
      <input type="text" id="${inputId}" value="${(values&&values[f.id])||''}"
        oninput="updateFormValue('${prefix}','${f.id}',this.value)" placeholder="Your answer">
    </div>`;
  }).join('');
}

function updateFormValue(prefix,fid,val){
  if(prefix==='ff'){formValues[fid]=val;updateProgress();}
  else if(prefix==='dff'){disputeValues[fid]=val;}
  else if(prefix==='cff'){formValues[fid]=val;updateProgress();}
}

function selectRadio(prefix,fid,val,el){
  updateFormValue(prefix,fid,val);
  document.querySelectorAll(`.radio-option input[name="${prefix}_${fid}"]`).forEach(inp=>{
    inp.parentElement.classList.remove('selected');
  });
  el.classList.add('selected');
  if(prefix==='ff'||prefix==='cff') updateProgress();
}

function restoreRadios(prefix){
  prefix=prefix||'ff';
  const vals=prefix==='dff'?disputeValues:formValues;
  Object.entries(vals).forEach(([fid,val])=>{
    document.querySelectorAll(`.radio-option input[name="${prefix}_${fid}"]`).forEach(inp=>{
      if(inp.value===val) inp.parentElement.classList.add('selected');
    });
  });
}

function updateProgress(){
  if(!activeSim)return;
  const fields=(activeSim.fields||[]).filter(f=>!f.id.startsWith('_'));
  const filled=fields.filter(f=>formValues[f.id]&&String(formValues[f.id]).trim()).length;
  const pct=fields.length?Math.round(filled/fields.length*100):0;
  const bar=document.getElementById('prog-fill');
  if(bar)bar.style.width=pct+'%';
}

function scheduleNotesSave(){

  notesSaveTimer=setTimeout(async()=>{

    const txt=area.value;
    const existing=window._myNotes&&window._myNotes.find(n=>n.simulation_id===activeSim.id);
    if(existing){
      await sb('notes?id=eq.'+existing.id,{method:'PATCH',body:JSON.stringify({content:txt,updated_at:new Date().toISOString()}),prefer:'return=minimal'});

async function doCounterSubmit(){

  const missing=(activeSim.fields||[]).filter(f=>f.required&&!f.id.startsWith('_')&&!formValues[f.id]);
  if(missing.length){alert('Please fill in: '+missing.map(f=>f.label).join(', '));return;}

  const btn=document.getElementById('counter-sub-btn');
  if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  const now=new Date().toISOString();
  const r=await sb('submissions',{method:'POST',body:JSON.stringify({
    student_id:student.id,simulation_id:activeSim.id,
    form_data:{...formValues},submitted_at:now,updated_at:now
  }),prefer:'return=minimal'});
  if(r.ok){
    window._pendingPartnerSub=null;
    if(draftKey)localStorage.removeItem(draftKey);
    await load();
  } else {
    if(btn){btn.disabled=false;btn.textContent='Submit my version';}
    alert('Could not submit. Please try again.');
  }
}

async function doSubmit(){
  if(!activeSim)return;
  const missing=(activeSim.fields||[]).filter(f=>f.required&&!f.id.startsWith('_')&&!formValues[f.id]);
  if(missing.length){alert('Please fill in: '+missing.map(f=>f.label).join(', '));return;}
  if(!confirm('Submit your results for '+activeSim.name+'?'))return;
  const btn=document.getElementById('sub-btn');
  if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  try{
    const now=new Date().toISOString();
    if(submission){
      await sb('submissions?id=eq.'+submission.id,{method:'PATCH',body:JSON.stringify({form_data:{...formValues},updated_at:now}),prefer:'return=minimal'});
    } else {
      await sb('submissions',{method:'POST',body:JSON.stringify({student_id:student.id,simulation_id:activeSim.id,form_data:{...formValues},submitted_at:now,updated_at:now}),prefer:'return=minimal'});
    }
    if(draftKey)localStorage.removeItem(draftKey);
    editMode=false;
    formValues={};
    await load();
  }catch(e){
    saveDraft();
    if(btn){btn.disabled=false;btn.textContent=editMode?'Update results':'Submit results';}
    alert('Submission failed — your progress is saved. Please try again.');
  }
}

async function doConfirm(){
  if(!submission)return;
  const btn=document.querySelector('.btn-confirm');

  const r=await sb('submissions?id=eq.'+submission.id,{
    method:'PATCH',
    body:JSON.stringify({form_data:{...submission.form_data,_confirmed:true},updated_at:new Date().toISOString()}),

  });

}

function showDisputeForm(){

  if(!form)return;
  disputeValues={};
  Object.entries(submission?.form_data||{}).forEach(([k,v])=>{
    if(!k.startsWith('_'))disputeValues[k]=v;
  });
  const fieldsDiv=document.getElementById('dispute-form-fields');
  if(fieldsDiv&&activeSim){
    fieldsDiv.innerHTML=renderForm(activeSim.fields,disputeValues,'dff');
  }
  form.classList.add('show');
  restoreRadios('dff');
  form.scrollIntoView({behavior:'smooth',block:'start'});

}

async function doDispute(){
  if(!submission||!activeSim)return;
  const fields=(activeSim.fields||[]).filter(f=>!f.id.startsWith('_'));
  fields.forEach(f=>{
    if(f.type!=='radio'){
      const el=document.getElementById('dff_'+f.id);
      if(el) disputeValues[f.id]=el.value;
    }
  });
  const note=document.getElementById('dispute-note')?.value||'';
  const newFormData={
    ...disputeValues,
    _disputed:true,
    _dispute_note:note,
    _original_answers:{...submission.form_data}
  };
  const btn=document.querySelector('#dispute-form .submit-btn');
  if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  const r=await sb('submissions?id=eq.'+submission.id,{
    method:'PATCH',
    body:JSON.stringify({form_data:newFormData,updated_at:new Date().toISOString()}),
    prefer:'return=minimal'
  });
  if(r.ok){disputeValues={};await load();}
  else{if(btn){btn.disabled=false;btn.textContent='Submit my version';}alert('Could not submit. Please try again.');}
}

        }

// FIX-S1: doReflect no longer calls load() on success.
// Instead it swaps only the reflection card in-place, preserving any other
// in-progress typing on the page (notes, form fields, etc.).
async function doReflect(){
  if(!activeSim||!student)return;
  const mistake=document.getElementById('ref-mistake')?.value||'';
  const different=document.getElementById('ref-different')?.value||'';
  const customAnswers=[];
  let qi=0;
  while(document.getElementById('ref-custom-'+qi)){
    customAnswers.push(document.getElementById('ref-custom-'+qi).value||'');
    qi++;
  }
  // Collect private field answers
  const privateFields=(activeSim.fields||[]).filter(f=>f.private&&!f.id.startsWith('_'));
  const privateAnswers={};
  privateFields.forEach(f=>{
    if(f.type==='radio'){
      const checked=document.querySelector(`input[name="ref-priv-${f.id}"]:checked`);
      privateAnswers[f.id]=checked?checked.value:'';
    } else {
      privateAnswers[f.id]=document.getElementById('ref-priv-'+f.id)?.value||'';
    }
  });
  const btn=document.querySelector('.reflection-card .submit-btn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const r=await sb('reflections',{method:'POST',body:JSON.stringify({
    student_id:student.id,simulation_id:activeSim.id,
    mistake,do_differently:different,
    custom_response:customAnswers.join(' ||| '),
    private_data:Object.keys(privateAnswers).length?JSON.stringify(privateAnswers):null
  }),prefer:'return=minimal'});
  if(r.ok){
    const reflCard=document.querySelector('.reflection-card');
    if(reflCard){
      const wrapper=document.createElement('div');
      wrapper.className='card';
      wrapper.innerHTML='<div class="card-body"><div class="banner banner-green" style="margin-bottom:0">✓ Reflection submitted — thanks!</div></div>';
      reflCard.replaceWith(wrapper);
    }
  } else {
    if(btn){btn.disabled=false;btn.textContent='Submit reflection';}
    alert('Could not save. Please try again.');
  }
}

function renderMyProgress(submissions,assignments,reflections){
  if(submissions.length<1)return'';
  const completedSims=submissions.map(sub=>{
    const sim=allSims.find(s=>s.id===sub.simulation_id);
    const asg=assignments.find(a=>a.simulation_id===sub.simulation_id);
    const refl=reflections.find(r=>r.simulation_id===sub.simulation_id);
    if(!sim)return null;
    const dealField=(sim?.fields||[]).find(f=>f.type==='radio'&&(f.options||[]).includes('Yes'))?.id||'f4';
    const numFields=(sim?.fields||[]).filter(f=>f.type==='number');
    const firstNum=numFields[0];
    const numVal=firstNum?parseFloat(sub.form_data?.[firstNum.id]):null;
    return{sim,asg,sub,refl,deal:sub.form_data?.[dealField],numVal,numLabel:firstNum?.label};
  }).filter(Boolean).sort((a,b)=>(a.sim.sort_order||0)-(b.sim.sort_order||0));

  if(!completedSims.length)return'';

  const totalSims=allSims.length;
  const dealCount=completedSims.filter(s=>s.deal==='Yes').length;
  const dealRate=completedSims.length?Math.round(dealCount/completedSims.length*100):0;
  const reflCount=reflections.length;
  const pct=Math.round(completedSims.length/Math.max(totalSims,1)*100);

  const mistakeWords={};
  reflections.forEach(r=>{
    if(!r.mistake)return;
    r.mistake.toLowerCase().split(/\W+/).filter(w=>w.length>4&&!['about','their','would','could','should','there','where','which','these','those','after','before','during'].includes(w)).forEach(w=>{
      mistakeWords[w]=(mistakeWords[w]||0)+1;
    });
  });
  const topThemes=Object.entries(mistakeWords).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([w])=>w);

  return`<div class="card" style="border-top:2px solid var(--navy-3)">
    <div class="card-header">
      <div>
        <div class="card-title">📈 My semester arc</div>
        <div class="card-sub" style="margin-top:3px">${completedSims.length} of ${totalSims} simulations complete</div>
      </div>
      ${completedSims.length>=totalSims?'<span class="pill pill-green">Semester complete</span>':''}
    </div>
    <div class="card-body">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
        <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
          <div style="height:100%;background:linear-gradient(90deg,var(--navy-3),var(--accent));border-radius:3px;width:${pct}%;transition:width .6s"></div>
        </div>
        <span style="font-size:12px;color:var(--text-3);flex-shrink:0;font-family:'Space Grotesk',sans-serif">${completedSims.length}/${totalSims}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
        ${[
          {v:dealRate+'%',l:'Deal rate',c:'var(--navy-3)',sub:dealCount+' of '+completedSims.length},
          {v:reflCount,l:'Reflections',c:'var(--blue)',sub:reflCount+' of '+completedSims.length+' sims'},
          {v:completedSims.length,l:'Completed',c:'var(--accent)',sub:'of '+totalSims+' total'},
        ].map(s=>`<div style="text-align:center;padding:14px 8px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)">
          <div style="font-size:24px;font-weight:800;color:${s.c};font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em">${s.v}</div>
          <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px">${s.l}</div>
          <div style="font-size:10px;color:var(--text-4);margin-top:2px">${s.sub}</div>
        </div>`).join('')}
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-family:'Space Grotesk',sans-serif">Simulation outcomes</div>
      <div style="display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap">
        ${completedSims.map((s,i)=>{
          const color=s.deal==='Yes'?'var(--green)':s.deal==='No'?'var(--red)':'var(--border)';
          const bg=s.deal==='Yes'?'var(--green-light)':s.deal==='No'?'var(--red-light)':'var(--bg)';
          return`<div title="${s.sim.name} · ${s.asg?.role||''} · ${s.deal==='Yes'?'Deal':'No deal'}" style="width:28px;height:28px;border-radius:6px;background:${bg};border:1.5px solid ${color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${color};cursor:default">${i+1}</div>`;
        }).join('')}
        ${allSims.filter(s=>!completedSims.find(c=>c.sim.id===s.id)).map((_,i)=>`<div style="width:28px;height:28px;border-radius:6px;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--border);cursor:default">${completedSims.length+i+1}</div>`).join('')}
      </div>
      ${completedSims.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg)">
        <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${s.deal==='Yes'?'var(--green)':s.deal==='No'?'var(--red)':'var(--border)'}"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${s.sim.name}</div>
          <div style="font-size:11px;color:var(--text-3)">${s.asg?.role||''}</div>
        </div>
        <span style="font-size:11px;font-weight:700;color:${s.deal==='Yes'?'var(--green)':s.deal==='No'?'var(--red)':'var(--text-3)'}">${s.deal==='Yes'?'Deal':s.deal==='No'?'No deal':'—'}</span>
        ${s.refl?'<span style="font-size:10px;color:var(--blue)" title="Reflected">✎</span>':''}
      </div>`).join('')}
      ${topThemes.length?`<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-family:'Space Grotesk',sans-serif">Themes in your reflections</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          ${topThemes.map(w=>`<span style="padding:4px 12px;background:var(--blue-light);color:var(--blue);border-radius:20px;font-size:12px;font-weight:600;border:1px solid rgba(26,86,219,.15)">${w}</span>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--text-4);margin-top:8px">Words that appear most in what you'd do differently.</div>
      </div>`:''}
    </div>
  </div>`;
}

// ── ASSESSMENT ────────────────────────────────────────────────────────────────
const ASSESSMENT_QUESTIONS=[
  "If the other party's position seems very important to him or her, I may sacrifice my own position.",
  "I address problems and concerns directly without blame or judgment.",
  "I try to win by convincing the other party of the logic and benefits of my position.",
  "I tell the other person my ideas for and ask for his or hers in return.",
  "I try to find a compromise solution.",
  "I try to postpone discussions until I have had some time to think.",
  "I see achievement as more important than relational issues.",
  "I use body language that might be perceived as condescending or arrogant.",
  "Confronting someone about a problem is very uncomfortable for me.",
  "I give up some points in exchange for others.",
  "I propose a middle ground.",
  "I am likely to take a comment back or try to soften it if I realize that it hurt someone's feelings.",
  "I think it is all right to ask for what I want or to explain how I feel.",
  "I find conflict stressful and will avoid it any way I can.",
  "I have been described as impatient, controlling, insensitive or emotionally detached.",
  "If asked to do something I don't agree with or don't want to do, I'll do it but deliberately won't do it as well as I could have.",
  "I let my body language communicate my feelings rather than telling people directly how I feel.",
  "I remain calm and confident when faced with aggression or criticism.",
  "I may overextend myself trying to meet everyone's needs.",
  "I try to find fair combination of gains and losses for both of us.",
  "I look for and acknowledge common ground.",
  "I have a hard time being clear about what I want and need for fear of appearing demanding or selfish.",
  "I can overlook valuable ideas in favor of action.",
  "I may not be open to hear other points of view.",
  "I avoid taking positions that would create controversy."
];
const ASSESS_WHITE_BOX={1:'C',2:'E',3:'B',4:'E',5:'D',6:'A',7:'B',8:'B',9:'C',10:'D',11:'D',12:'C',13:'E',14:'A',15:'B',16:'A',17:'A',18:'E',19:'C',20:'D',21:'E',22:'C',23:'C',24:'B',25:'A'};

function openAssessmentPage(type){
  const overlay=document.getElementById('assessment-overlay');
  overlay.style.display='flex';
  overlay.dataset.type=type;
  document.getElementById('assess-modal-title').textContent=(type==='pre'?'Pre-Semester':'End-of-Semester')+' Self-Assessment';
  const anonEl=document.getElementById('assess-anon-id');
  if(anonEl)anonEl.textContent='#'+String(student?.anon_number||'?').padStart(2,'0');
  renderAssessmentTable(type);
  overlay.scrollTop=0;
}
function closeAssessmentPage(){document.getElementById('assessment-overlay').style.display='none';}

function renderAssessmentTable(type){
  const container=document.getElementById('assessment-table-container');
  const cols=['A','B','C','D','E'];
  const headerCols=cols.map(c=>`<th style="width:44px;text-align:center;padding:8px 4px;background:#1a6b5c;color:#fff;font-size:14px;font-weight:700;border:1px solid #14594d">${c}</th>`).join('');
  const rows=ASSESSMENT_QUESTIONS.map((q,i)=>{
    const n=i+1;
    const activeCol=ASSESS_WHITE_BOX[n];
    const cells=cols.map(col=>{
      if(col===activeCol)return`<td style="text-align:center;padding:4px;border:1px solid #ccc;background:#fff">
        <input type="number" id="aq_${n}" min="0" max="5" value=""
          style="width:36px;height:30px;text-align:center;border:1px solid #aaa;border-radius:4px;font-size:14px;font-weight:600;padding:0"
          oninput="updateAssessTotal()" onchange="this.value=Math.max(0,Math.min(5,parseInt(this.value)||0))">
      </td>`;
      return`<td style="background:#d0d0d0;border:1px solid #bbb;width:44px"></td>`;
    }).join('');
    return`<tr style="border-bottom:1px solid #ddd">
      <td style="padding:8px 10px;font-size:13px;line-height:1.5;border:1px solid #ddd;vertical-align:middle"><span style="font-weight:600;margin-right:6px">${n}.</span>${q}</td>
      ${cells}
    </tr>`;
  }).join('');
  const totalCells=cols.map(c=>`<td style="text-align:center;padding:8px 4px;border:1px solid #ccc;background:#f0f0f0">
    <div id="col-total-${c}" style="width:36px;height:30px;line-height:30px;text-align:center;font-size:14px;font-weight:700;margin:0 auto;background:#fff;border:1px solid #aaa;border-radius:4px">0</div>
  </td>`).join('');
  container.innerHTML=`
    <div style="font-size:12px;color:#555;margin-bottom:12px;line-height:1.6;background:#fffbf0;border:1px solid #f0d9c0;border-radius:8px;padding:10px 14px">
      Score yourself on each statement on a scale of <strong>0 – 5</strong>. &nbsp;0 = never &nbsp;1 = rarely &nbsp;2 = sometimes &nbsp;3 = occasionally &nbsp;4 = frequently &nbsp;5 = always
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:#1a6b5c"><th style="text-align:left;padding:10px 12px;color:#fff;font-size:14px;font-weight:700;border:1px solid #14594d">Statement</th>${headerCols}</tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr style="background:#f5f5f5"><td style="padding:8px 12px;font-size:12px;font-weight:700;text-align:right;border:1px solid #ddd;color:#555">Total your score for each column</td>${totalCells}</tr></tfoot>
      </table>
    </div>`;
}

function updateAssessTotal(){
  const cols=['A','B','C','D','E'];
  const totals={A:0,B:0,C:0,D:0,E:0};
  for(let n=1;n<=25;n++){
    const col=ASSESS_WHITE_BOX[n];
    const el=document.getElementById('aq_'+n);
    if(el)totals[col]+=Math.max(0,Math.min(5,parseInt(el.value)||0));
  }
  cols.forEach(c=>{const el=document.getElementById('col-total-'+c);if(el)el.textContent=totals[c];});
}

async function submitAssessment(){
  const overlay=document.getElementById('assessment-overlay');
  const type=overlay.dataset.type;
  const responses={};
  const colTotals={A:0,B:0,C:0,D:0,E:0};
  let missing=[];
  for(let n=1;n<=25;n++){
    const col=ASSESS_WHITE_BOX[n];
    const el=document.getElementById('aq_'+n);
    const v=el?Math.max(0,Math.min(5,parseInt(el.value)||0)):0;
    if(el&&(el.value===''||el.value===null))missing.push(n);
    responses['q'+n]=v;
    colTotals[col]+=v;
  }
  if(missing.length>0&&!confirm(`${missing.length} question(s) not answered (${missing.join(', ')}). Submit anyway with 0 for blank answers?`))return;
  const btn=document.getElementById('assess-submit-btn');
  if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  const r=await sb('self_assessments',{method:'POST',body:JSON.stringify({student_id:student.id,anon_number:student.anon_number,type,responses,col_totals:colTotals}),prefer:'return=minimal'});
  if(r.ok){closeAssessmentPage();await load();}
  else{if(btn){btn.disabled=false;btn.textContent='Submit assessment';}alert('Could not submit. Please try again.');}
}

init();
</script>

<!-- ASSESSMENT OVERLAY -->
<div class="assess-overlay" id="assessment-overlay">
  <div class="assess-modal">
    <div class="assess-modal-header">
      <div>
        <div class="assess-modal-title" id="assess-modal-title">Self-Assessment Inventory</div>
        <div class="assess-modal-sub">Score 0–5 for each statement. Enter your score in the white box only.</div>
      </div>
      <button class="assess-close" onclick="closeAssessmentPage()" title="Close">✕</button>
    </div>
    <div class="assess-modal-body">
      <div id="assessment-table-container"></div>
    </div>
    <div class="assess-modal-footer">
      <span style="font-size:12px;color:var(--text-3);flex:1">Your anonymous ID: <strong id="assess-anon-id">#—</strong></span>
      <button class="btn btn-outline" onclick="closeAssessmentPage()">Cancel</button>
      <button class="btn btn-primary" id="assess-submit-btn" onclick="submitAssessment()">Submit assessment</button>
    </div>
  </div>
</div>
</body>
</html>
